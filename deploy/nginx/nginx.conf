# ============================================================
# ShadowLink — Nginx Main Configuration
# ============================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log  /var/log/nginx/access.log json;

    # ── Performance ──
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # ── Gzip ──
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Security ──
    server_tokens off;

    # ── Rate Limiting Zones ──
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_agent:10m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=2r/s;

    # ── Connection Limit ──
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ── Upstream Definitions ──
    upstream java_backend {
        server shadowlink-server:8080;
        keepalive 32;
    }

    upstream python_ai {
        server shadowlink-ai:8000;
        keepalive 16;
    }

    upstream frontend {
        server shadowlink-web:80;
    }

    # ── Include site configs ──
    include /etc/nginx/conf.d/*.conf;
}
