# ============================================================
# ShadowLink — Development Site Configuration
# Routes to Vite dev server instead of static build
# ============================================================

server {
    listen 80;
    server_name localhost;

    # No security headers in dev for easier debugging
    client_max_body_size 100M;

    # ── Vite dev server (with HMR WebSocket) ──
    location / {
        proxy_pass http://shadowlink-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Java Backend API ──
    location /api/ {
        proxy_pass http://java_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── SSE Streaming (dev) ──
    location /api/ai/agent/stream {
        proxy_pass http://python_ai/api/v1/agent/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_set_header Accept-Encoding "";
    }

    # ── WebSocket ──
    location /ws {
        proxy_pass http://java_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Python AI direct ──
    location /ai/ {
        proxy_pass http://python_ai/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # ── Actuator (open in dev) ──
    location /actuator/ {
        proxy_pass http://java_backend/actuator/;
    }

    # ── Health ──
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx-dev"}';
        add_header Content-Type application/json;
    }
}
