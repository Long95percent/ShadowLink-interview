# ============================================================
# ShadowLink — Production Site Configuration
# ============================================================

server {
    listen 80;
    server_name localhost;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Connection limits ──
    limit_conn conn_per_ip 100;

    # ── Client body size (file uploads) ──
    client_max_body_size 100M;

    # ── React SPA — proxy to frontend container ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SPA fallback
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ── Static assets — aggressive caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Java Backend API ──
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://java_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }

    # ── Agent execution API (longer timeout, stricter rate limit) ──
    location /api/agent/ {
        limit_req zone=api_agent burst=5 nodelay;

        proxy_pass http://java_backend/api/agent/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;

        # Agent executions can take longer
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── SSE Streaming endpoint (proxy_buffering off is critical) ──
    location /api/ai/agent/stream {
        proxy_pass http://python_ai/api/v1/agent/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;

        # SSE-critical settings
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;

        # Disable gzip for SSE
        proxy_set_header Accept-Encoding "";
    }

    # ── File upload endpoint ──
    location /api/rag/ingest {
        limit_req zone=api_upload burst=3 nodelay;

        proxy_pass http://java_backend/api/rag/ingest;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Large file upload timeout
        client_max_body_size 100M;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    300s;
    }

    # ── WebSocket ──
    location /ws {
        proxy_pass http://java_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket keepalive
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    # ── Python AI direct access (internal — Java bridge uses this) ──
    location /ai/ {
        # Internal-only: block external access in production
        # allow 172.28.0.0/16;
        # deny all;

        proxy_pass http://python_ai/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
    }

    # ── Spring Boot Actuator (restricted) ──
    location /actuator/ {
        # Only allow internal docker network
        allow 172.28.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://java_backend/actuator/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Health check endpoint for nginx itself ──
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
