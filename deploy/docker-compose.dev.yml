# ============================================================
# ShadowLink — Development Overrides
# ============================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Or with optional MySQL/Redis:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile with-infra up
#
# With monitoring:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile monitoring up
# ============================================================

services:

  # ── Java Backend (dev mode) ──
  shadowlink-server:
    build:
      context: ../shadowlink-server
      dockerfile: Dockerfile
      target: builder          # Stop at builder stage (has JDK, not just JRE)
    container_name: sl-server-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # H2 in-memory database — no MySQL dependency in dev
      SPRING_DATASOURCE_URL: jdbc:h2:mem:shadowlink;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD:
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      # Disable Redis in dev
      SPRING_DATA_REDIS_HOST: ""
      # Remote debug
      JAVA_OPTS: >-
        -Xms128m
        -Xmx512m
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
        -Dspring.devtools.restart.enabled=true
      # AI service in same compose network
      SHADOWLINK_AI_GRPC_HOST: shadowlink-ai
      SHADOWLINK_AI_REST_URL: http://shadowlink-ai:8000
    volumes:
      - ../shadowlink-server:/build                          # Source mount for devtools
      - server-m2-cache:/root/.m2                           # Maven cache
    ports:
      - "8080:8080"
      - "5005:5005"         # Java remote debug
    depends_on:
      mysql:
        condition: service_started
        required: false
      redis:
        condition: service_started
        required: false
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      start_period: 90s     # Dev builds slower

  # ── Python AI Service (dev mode with hot-reload) ──
  shadowlink-ai:
    build:
      context: ../shadowlink-ai
      dockerfile: Dockerfile
      target: runtime
    container_name: sl-ai-dev
    environment:
      SHADOWLINK_ENV: dev
      SHADOWLINK_DEBUG: "true"
      SHADOWLINK_LOG_LEVEL: DEBUG
      SHADOWLINK_LLM__BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      SHADOWLINK_LLM__API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ../shadowlink-ai/app:/app/app                       # Hot-reload source
      - ../shadowlink-ai/tests:/app/tests                   # Tests accessible
      - ../shadowlink-ai/proto:/app/proto
      - ai-data-dev:/app/data
    command: >
      python -m uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app
        --log-level debug
    ports:
      - "8000:8000"
      - "50051:50051"
      - "5678:5678"         # debugpy remote debug
    deploy:
      resources:
        limits:
          memory: 2G

  # ── React Frontend (Vite dev server with HMR) ──
  shadowlink-web:
    image: node:20-alpine
    container_name: sl-web-dev
    working_dir: /app
    volumes:
      - ../shadowlink-web:/app
      - web-node-modules:/app/node_modules                  # Isolated node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx (dev proxy — connects Vite HMR) ──
  nginx:
    container_name: sl-nginx-dev
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: []
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]

  # ── Infrastructure (still runs, but lightweight config in dev) ──
  mysql:
    container_name: sl-mysql-dev
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    container_name: sl-redis-dev
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Monitoring (already profile-gated in base) ──
  prometheus:
    profiles:
      - monitoring

  grafana:
    profiles:
      - monitoring

# ── Dev-only volumes ──
volumes:
  server-m2-cache:
    driver: local
  ai-data-dev:
    driver: local
  web-node-modules:
    driver: local
