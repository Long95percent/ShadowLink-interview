# ============================================================
# ShadowLink — Redis Configuration
# ============================================================

# Network
bind 0.0.0.0
port 6379
tcp-keepalive 300
timeout 0

# Memory
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF (Append-Only File) for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Security (set password via environment or here)
# requirepass your_password_here

# Limits
maxclients 1000
