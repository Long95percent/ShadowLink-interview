# ============================================================
# ShadowLink — Prometheus Monitoring Configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── Java Backend (Spring Boot Actuator / Prometheus) ──
  - job_name: 'shadowlink-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['shadowlink-server:8080']
        labels:
          service: 'java-backend'
          environment: 'production'

  # ── Python AI Service ──
  - job_name: 'shadowlink-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['shadowlink-ai:8000']
        labels:
          service: 'python-ai'
          environment: 'production'

  # ── Nginx (requires nginx-prometheus-exporter sidecar) ──
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']

  # ── Redis ──
  # Requires redis_exporter sidecar
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # ── MySQL ──
  # Requires mysqld_exporter sidecar
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']

  # ── Prometheus self-monitoring ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
