syntax = "proto3";

package shadowlink.rag;

option java_package = "com.shadowlink.bridge.proto";
option java_multiple_files = true;

service RAGService {
  // Execute the full RAG pipeline
  rpc Query (RAGRequest) returns (RAGResponse);

  // Ingest documents into the index
  rpc Ingest (IngestRequest) returns (IngestResponse);
}

message RAGRequest {
  string query = 1;
  string mode_id = 2;
  int32 top_k = 3;
  map<string, string> filters = 4;
}

message RAGResponse {
  string answer = 1;
  repeated RAGChunk chunks = 2;
  RAGTrace trace = 3;
}

message RAGChunk {
  string content = 1;
  string source = 2;
  float score = 3;
  map<string, string> metadata = 4;
}

message RAGTrace {
  string trace_id = 1;
  string original_query = 2;
  string rewritten_query = 3;
  int32 retrieved_count = 4;
  int32 after_rerank_count = 5;
  double total_latency_ms = 6;
}

message IngestRequest {
  string file_path = 1;
  string mode_id = 2;
  map<string, string> metadata = 3;
}

message IngestResponse {
  bool success = 1;
  int32 chunk_count = 2;
  string message = 3;
}
