# ── Development Profile ──
# H2 in-memory database, verbose logging, Swagger UI enabled.

spring:
  datasource:
    url: jdbc:h2:mem:shadowlink;DB_CLOSE_DELAY=-1;MODE=MySQL;INIT=RUNSCRIPT FROM 'classpath:schema-h2.sql'
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.shadowlink: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG
