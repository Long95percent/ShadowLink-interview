# ── Production Profile ──
# MySQL, Redis required, restricted logging, Swagger disabled.

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:shadowlink}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:shadowlink}
    password: ${DB_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 30
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
  h2:
    console:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Disable Swagger in production
knife4j:
  enable: false

# JWT secret MUST be overridden via environment variable
shadowlink:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}

logging:
  level:
    com.shadowlink: INFO
    org.springframework: WARN
